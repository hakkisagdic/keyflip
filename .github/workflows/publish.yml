# Tag push (vX.Y.Z) -> test -> publish to npm via Trusted Publishing (OIDC) ->
# create the GitHub Release with the tarball. ONE workflow, one trigger.
#
# Why not a separate release-then-publish chain: a GitHub Release created by a
# workflow using the default GITHUB_TOKEN does NOT trigger `on: release`
# (recursion guard), so the publish step must live on the tag-push trigger.
#
# No NPM_TOKEN: npm authenticates this workflow via OIDC. One-time setup on
# npmjs.com — package keyflip → Settings → Trusted Publisher → GitHub Actions:
#   user hakkisagdic · repo keyflip · workflow publish.yml
name: Publish

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write   # gh release create
  id-token: write   # npm Trusted Publishing (OIDC)

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - name: Upgrade npm (OIDC needs >= 11.5.1)
        run: npm install -g npm@latest
      - name: Verify tag matches package.json (tag pushes only)
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          PKG="$(node -p "require('./package.json').version")"
          TAG="${GITHUB_REF_NAME#v}"
          test "$PKG" = "$TAG" || { echo "::error::version $PKG != tag $TAG"; exit 1; }
      - name: Test
        run: npm test
      - name: Publish to npm (OIDC, provenance)
        run: npm publish --provenance --access public
      - name: Create the GitHub Release with the tarball
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          npm pack
          gh release create "$GITHUB_REF_NAME" ./*.tgz --generate-notes --verify-tag || \
            gh release upload "$GITHUB_REF_NAME" ./*.tgz --clobber
