name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: test (${{ matrix.os }}, node ${{ matrix.node }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - name: Versions
        run: node --version
      # No dependencies to install — the tool is pure Node stdlib.
      - name: Run tests
        run: npm test
      - name: CLI smoke test
        run: node bin/keyflip.js version

  # Real-keychain end-to-end: exercises /usr/bin/security against a throwaway
  # keychain (never the runner's login keychain). Hard timeout so a stuck
  # SecurityAgent dialog fails loudly instead of hanging the job.
  keychain-macos:
    name: real keychain (macOS)
    runs-on: macos-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Real keychain round-trip
        env:
          KEYFLIP_REAL_KEYCHAIN: '1'
        run: node --test test/keychain.real.test.js
